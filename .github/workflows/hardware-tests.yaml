name: Hardware tests on RevPi

on:
  workflow_dispatch:
  push:
    branches: [test-runner, main, 🏗️]
  pull_request:

permissions:
  contents: read

jobs:
  hardware-tests:
    runs-on:
      - arm64
      - hardware-tests
      - icoapi
      - revpi

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Run hardware tests
        run: just test
