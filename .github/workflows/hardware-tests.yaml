name: Hardware tests on RevPi

on:
  push:
  # Run CI job when someone adds a label to a pull request
  pull_request:
    types:
      - labeled

permissions:
  contents: read

jobs:
  hardware-tests:

    # Check if we should execute the job:
    #
    # 1. If the pull request contains the appropriate label
    # 2. If we push to the main branch
    # 3. If one of the main developers changed the code
    #
    # Unfortunately the GitHub context will only contain the label,
    # if the CI job was triggered by adding a label to the PR. This means we
    # have to remove and add the label `hardware-test` again, every time
    # we want to check the code of an external contributor using this
    # workflow.
    if: github.event.label.name == 'hardware-test' ||
        github.ref == 'refs/heads/main' ||
        github.actor == 'sanssecours' ||
        github.actor == 'wementoat'

    runs-on:
      - arm64
      - hardware-tests
      - icoapi
      - revpi

    steps:

      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install just
        uses: taiki-e/install-action@just

      # TODO: Remove `if` and `grep` after we close
      #       https://github.com/MyTooliT/ICOtronic/issues/32
      - name: Reset ICOtronic hardware
        run: |
          just setup
          if uv run icon stu reset 2>&1 >/dev/null | grep 'Unable to'; then
            exit 1
          fi

      - name: Check if test sensor node is available
        run: |
          uv run icon list > devices.txt
          if ! grep -q Test-STH devices.txt; then
            printerr() { printf "%s\n" "$@" 1>&2; }
            printerr "Unable to find “Test-STH”"
            printerr "Found the following sensor nodes:"
            printerr "—————————————————————————————————"
            cat devices.txt 1>&2
            printerr "—————————————————————————————————"
            exit 1
          fi

      - name: Run hardware tests
        run: just test
