name: Hardware tests on RevPi

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - labeled

permissions:
  contents: read

jobs:
  hardware-tests:

    # Only run job, after we add `hardware-test` label
    if: github.event.label.name == 'hardware-test'

    runs-on:
      - arm64
      - hardware-tests
      - icoapi
      - revpi

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Reset ICOtronic hardware
        run: |
          just setup
          uv run icon stu reset

      - name: Run hardware tests
        run: just test
